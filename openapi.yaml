---
openapi: 3.1.0
info:
  title: LeanStock Backend
  description: Production-grade inventory backend with JWT auth, email verification,
    Redis worker, PostgreSQL and multi-tenancy.
  version: 2.0.0
paths:
  "/auth/register":
    post:
      tags:
      - Auth
      summary: Register User
      operationId: register_user_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RegisterRequest"
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/auth/verify-email":
    post:
      tags:
      - Auth
      summary: Verify Email Post
      operationId: verify_email_post_auth_verify_email_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/VerifyEmailRequest"
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
    get:
      tags:
      - Auth
      summary: Verify Email Get
      operationId: verify_email_get_auth_verify_email_get
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/auth/login":
    post:
      tags:
      - Auth
      summary: Login User
      operationId: login_user_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/LoginRequest"
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/auth/refresh":
    post:
      tags:
      - Auth
      summary: Refresh Token
      operationId: refresh_token_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RefreshRequest"
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/auth/logout":
    post:
      tags:
      - Auth
      summary: Logout User
      operationId: logout_user_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/LogoutRequest"
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/auth/password-reset/request":
    post:
      tags:
      - Auth
      summary: Password Reset Request
      operationId: password_reset_request_auth_password_reset_request_post
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PasswordResetRequest"
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/auth/password-reset/confirm":
    post:
      tags:
      - Auth
      summary: Password Reset Confirm
      operationId: password_reset_confirm_auth_password_reset_confirm_post
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PasswordResetConfirmRequest"
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/inventory/create":
    post:
      tags:
      - Inventory
      summary: Create Item
      operationId: create_item_inventory_create_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/InventoryCreateRequest"
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/inventory/list":
    get:
      tags:
      - Inventory
      summary: Get Inventory
      operationId: get_inventory_inventory_list_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/inventory/transfer":
    post:
      tags:
      - Inventory
      summary: Transfer Inventory
      operationId: transfer_inventory_inventory_transfer_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/InventoryTransferRequest"
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/inventory/decay/run":
    post:
      tags:
      - Inventory
      summary: Dead Stock Decay
      operationId: dead_stock_decay_inventory_decay_run_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/DeadStockDecayRequest"
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/admin/users":
    get:
      tags:
      - Admin
      summary: List Users
      operationId: list_users_admin_users_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HTTPValidationError"
  "/":
    get:
      summary: Root
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    DeadStockDecayRequest:
      properties:
        discount_percent:
          type: number
          maximum: 90
          exclusiveMinimum: 0
          title: Discount Percent
      type: object
      required:
      - discount_percent
      title: DeadStockDecayRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            "$ref": "#/components/schemas/ValidationError"
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InventoryCreateRequest:
      properties:
        product_name:
          type: string
          title: Product Name
        location:
          type: string
          title: Location
        quantity:
          type: integer
          minimum: 0
          title: Quantity
        price:
          type: number
          minimum: 0
          title: Price
      type: object
      required:
      - product_name
      - location
      - quantity
      - price
      title: InventoryCreateRequest
    InventoryTransferRequest:
      properties:
        product:
          type: string
          title: Product
        from_loc:
          type: string
          title: From Loc
        to_loc:
          type: string
          title: To Loc
        qty:
          type: integer
          exclusiveMinimum: 0
          title: Qty
      type: object
      required:
      - product
      - from_loc
      - to_loc
      - qty
      title: InventoryTransferRequest
    LoginRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: LoginRequest
    LogoutRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
      - refresh_token
      title: LogoutRequest
    PasswordResetConfirmRequest:
      properties:
        token:
          type: string
          title: Token
        new_password:
          type: string
          minLength: 6
          title: New Password
      type: object
      required:
      - token
      - new_password
      title: PasswordResetConfirmRequest
    PasswordResetRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
      type: object
      required:
      - email
      title: PasswordResetRequest
    RefreshRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
      - refresh_token
      title: RefreshRequest
    RegisterRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          minLength: 6
          title: Password
      type: object
      required:
      - email
      - password
      title: RegisterRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VerifyEmailRequest:
      properties:
        token:
          type: string
          title: Token
      type: object
      required:
      - token
      title: VerifyEmailRequest
